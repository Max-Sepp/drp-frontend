name: EAS Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
      platform:
        description: Platform
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      android-build-id: ${{ steps.eas-build.outputs.android-build-id }}
      ios-build-id: ${{ steps.eas-build.outputs.ios-build-id }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with EAS
        id: eas-build
        run: |
          BUILDS=$(npx eas-cli@19.1.0 build \
            --profile ${{ github.event_name == 'push' && 'production' || inputs.profile }} \
            --platform ${{ github.event_name == 'push' && 'all' || inputs.platform }} \
            --non-interactive \
            --json)
          ANDROID_ID=$(echo "$BUILDS" | jq -r '.[] | select(.platform == "ANDROID") | .id')
          IOS_ID=$(echo "$BUILDS" | jq -r '.[] | select(.platform == "IOS") | .id')
          echo "android-build-id=$ANDROID_ID" >> "$GITHUB_OUTPUT"
          echo "ios-build-id=$IOS_ID" >> "$GITHUB_OUTPUT"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  release:
    needs: build
    if: needs.build.outputs.android-build-id != '' || needs.build.outputs.ios-build-id != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Get APK download URL
        id: apk
        if: needs.build.outputs.android-build-id != ''
        working-directory: frontend
        run: |
          URL=$(npx eas-cli@19.1.0 build:view ${{ needs.build.outputs.android-build-id }} \
            --json \
            --non-interactive | jq -r '.artifacts.applicationArchiveUrl')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get IPA download URL
        id: ipa
        if: needs.build.outputs.ios-build-id != ''
        working-directory: frontend
        run: |
          URL=$(npx eas-cli@19.1.0 build:view ${{ needs.build.outputs.ios-build-id }} \
            --json \
            --non-interactive | jq -r '.artifacts.applicationArchiveUrl')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Create GitHub Release
        run: |
          TAG=${{ github.ref_name }}
          {
            echo "### Downloads"
            if [ -n "${{ steps.apk.outputs.url }}" ]; then
              echo "**Android APK:** ${{ steps.apk.outputs.url }}"
            fi
            if [ -n "${{ steps.ipa.outputs.url }}" ]; then
              echo "**iOS IPA:** ${{ steps.ipa.outputs.url }}"
            fi
          } > release-notes.md
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
