name: EAS Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
      platform:
        description: Platform
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      android-build-id: ${{ steps.eas-build.outputs.android-build-id }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with EAS
        id: eas-build
        run: |
          BUILDS=$(npx eas-cli@19.1.0 build \
            --profile ${{ github.event_name == 'push' && 'production' || inputs.profile }} \
            --platform ${{ github.event_name == 'push' && 'android' || inputs.platform }} \
            --non-interactive \
            --wait \
            --json)
          ANDROID_ID=$(echo "$BUILDS" | jq -r '.[] | select(.platform == "ANDROID") | .id')
          echo "android-build-id=$ANDROID_ID" >> "$GITHUB_OUTPUT"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
