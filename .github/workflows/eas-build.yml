name: EAS Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
      platform:
        description: Platform
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      android-build-id: ${{ steps.eas-build.outputs.android-build-id }}
      android-apk-url: ${{ steps.eas-build.outputs.android-apk-url }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with EAS
        id: eas-build
        run: |
          BUILDS=$(npx eas-cli@19.1.0 build \
            --profile ${{ github.event_name == 'push' && 'production' || inputs.profile }} \
            --platform ${{ github.event_name == 'push' && 'android' || inputs.platform }} \
            --non-interactive \
            --wait \
            --json)
          ANDROID=$(echo "$BUILDS" | jq -r '.[] | select(.platform == "ANDROID")')
          ANDROID_ID=$(echo "$ANDROID" | jq -r '.id')
          ANDROID_APK_URL=$(echo "$ANDROID" | jq -r '.artifacts.applicationArchiveUrl')
          echo "android-build-id=$ANDROID_ID" >> "$GITHUB_OUTPUT"
          echo "android-apk-url=$ANDROID_APK_URL" >> "$GITHUB_OUTPUT"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  release:
    needs: build
    # Only publish a release for tag pushes that produced an Android build.
    if: github.event_name == 'push' && needs.build.outputs.android-build-id != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Download APK
        id: apk
        run: |
          URL="${{ needs.build.outputs.android-apk-url }}"
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "Could not resolve APK download URL" >&2
            exit 1
          fi
          curl -fSL "$URL" -o "drp-mobility-${{ github.ref_name }}.apk"

      - name: Create GitHub Release
        run: |
          TAG=${{ github.ref_name }}
          gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-notes \
            "drp-mobility-$TAG.apk#Android APK"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
