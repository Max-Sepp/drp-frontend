name: EAS Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v1.0.0) — used to create the GitHub Release
        required: false
        type: string
      profile:
        description: Build profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
      platform:
        description: Platform
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with EAS
        run: >
          npx eas-cli@19.1.0 build
          --profile ${{ github.event_name == 'push' && 'production' || inputs.profile }}
          --platform ${{ github.event_name == 'push' && 'all' || inputs.platform }}
          --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Get APK download URL
        id: apk
        working-directory: frontend
        run: |
          URL=$(npx eas-cli@19.1.0 build:list \
            --platform android \
            --status finished \
            --limit 1 \
            --json \
            --non-interactive | jq -r '.[0].artifacts.applicationArchiveUrl')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Create GitHub Release
        run: |
          TAG=${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
          cat > release-notes.md <<EOF
          ### Downloads
          **Android APK:** ${{ steps.apk.outputs.url }}
          EOF
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
